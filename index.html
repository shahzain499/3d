<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Product Store - Karachi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f0f23 0%, #1e3a8a 100%); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden;
        }
        
        /* HEADER */
        .header { 
            background: rgba(15,15,35,0.95); 
            padding: 1rem 2rem; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000;
        }
        .nav { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { 
            font-size: 2rem; 
            font-weight: bold; 
            background: linear-gradient(45deg, #3b82f6, white); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        /* HERO 3D IMAGE */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            perspective: 1000px;
            padding-top: 80px;
        }
        
        .hero-image {
            width: 70%;
            max-width: 500px;
            height: 70vh;
            max-height: 500px;
            object-fit: cover;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            animation: rotate3D 25s linear infinite, float 7s ease-in-out infinite;
            transform-style: preserve-3d;
        }
        
        /* 3D ROTATION ANIMATION */
        @keyframes rotate3D {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: rotateY(0deg) rotateX(0deg) translateY(0px); }
            50% { transform: rotateY(180deg) rotateX(5deg) translateY(-30px); }
        }
        
        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            animation: slideUp 1s ease 2s both;
            opacity: 0;
        }
        
        @keyframes slideUp {
            to { opacity: 1; transform: translate(-50%, -40%); }
        }
        
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.3rem; }
        
        /* PRODUCTS */
        .products {
            max-width: 1200px;
            margin: 5rem auto;
            padding: 0 2rem;
        }
        
        .section-title {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 4rem;
            background: linear-gradient(45deg, white, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(59,130,246,0.3);
            transition: all 0.4s;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        
        .product-card:hover {
            transform: translateY(-20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-color: #3b82f6;
        }
        
        .sale-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #ef4444;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 1rem;
        }
        
        .product-name { font-size: 1.4rem; margin-bottom: 0.5rem; }
        .price-sale { text-decoration: line-through; color: #ef4444; font-size: 1.1rem; margin-left: 0.5rem; }
        .price { font-size: 1.8rem; color: #3b82f6; font-weight: bold; }
        .add-cart {
            width: 100%;
            padding: 1rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .add-cart:hover { background: white; color: #3b82f6; }
        
        footer {
            background: #1e3a8a;
            text-align: center;
            padding: 3rem;
            margin-top: 5rem;
        }
        
        @media (max-width: 768px) {
            .hero-image { width: 90%; height: 60vh; }
            .hero h1 { font-size: 2.5rem; }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <nav class="nav">
            <div class="logo">Zain Product Store</div>
            <div>🛒 Cart: <span id="cart-count">0</span></div>
        </nav>
    </header>

    <!-- HERO WITH YOUR NEW IMAGE -->
    <section class="hero">
        <img src="https://img.sanishtech.com/u/de3f119c0d710b1c8f962ea5e509435a.jpg" 
             alt="Premium Product" 
             class="hero-image">
        <div class="hero-text">
            <h1>✨ Zain Product Store</h1>
            <p>Karachi's Best Deals | Up to 70% OFF</p>
        </div>
    </section>

    <!-- PRODUCTS -->
    <section class="products">
        <h2 class="section-title">🔥 Featured Products</h2>
        <div class="product-grid" id="product-grid"></div>
    </section>

    <footer>
        © 2026 Zain Product Store - Karachi, Pakistan 🇵🇰
    </footer>

    <script>
        const products = [
            {id:1, name:'Apple Watch Series 10', price:5200, sale:15000, img:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400'},
            {id:2, name:'Watch Series 10 Max', price:3200, sale:6400, img:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400'},
            {id:3, name:'AirPods Pro', price:2400, sale:4800, img:'https://images.unsplash.com/photo-1583394838336-acd977736f90?w=400'},
            {id:4, name:'HK9 Pro Max', price:7400, sale:20000, img:'https://images.unsplash.com/photo-1610945262589-6c3c4aadcbe4?w=400'},
            {id:5, name:'S300 Ultra', price:4000, sale:10000, img:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400'},
            {id:6, name:'S9 Ultra 4G', price:17500, sale:25000, img:'https://images.unsplash.com/photo-1610945262589-6c3c4aadcbe4?w=400'}
        ];
        
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            products.forEach(product => {
                const discount = Math.round((1 - product.price/product.sale)*100);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="sale-badge">${discount}% OFF</div>
                    <img src="${product.img}" alt="${product.name}" class="product-img">
                    <h3 class="product-name">${product.name}</h3>
                    <div>
                        <span class="price">Rs.${product.price.toLocaleString()}</span>
                        <span class="price-sale">Rs.${product.sale.toLocaleString()}</span>
                    </div>
                    <button class="add-cart" onclick="addToCart(${product.id}, event)">Add to Cart</button>
                `;
                grid.appendChild(card);
            });
        }
        
        function addToCart(id, e) {
            e.stopPropagation();
            const product = products.find(p => p.id === id);
            cart.push(product);
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cart-count').textContent = cart.length;
            
            const btn = e.target;
            const original = btn.textContent;
            btn.textContent = 'Added ✓';
            btn.style.background = '#10b981';
            setTimeout(() => {
                btn.textContent = original;
                btn.style.background = '#3b82f6';
            }, 1500);
        }
        
        window.addEventListener('load', () => {
            document.getElementById('cart-count').textContent = cart.length;
            renderProducts();
        });
        
        window.addToCart = addToCart;
    </script>
</body>
</html>
